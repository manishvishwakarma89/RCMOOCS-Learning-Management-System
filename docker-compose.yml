version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: rcmoocs_db
    restart: always
    environment:
      POSTGRES_DB: rcmoocs_lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432"
    volumes:
      - lms_postgres_data:/var/lib/postgresql/data   # ✅ matches existing volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rcmoocs-net

  web:
    build: .
    container_name: rcmoocs_web
    restart: always
    ports:
      - "5002:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rcmoocs_lms
      SECRET_KEY: lms-secret-key-2024
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - rcmoocs-net

volumes:
  lms_postgres_data:
    external: true    # ✅ reuse existing volume, don't create new

networks:
  rcmoocs-net:
    driver: bridge