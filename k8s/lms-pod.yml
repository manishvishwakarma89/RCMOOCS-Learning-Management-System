apiVersion: v1
kind: Pod
metadata:
  name: lmsapp-pod
  namespace: lmsapp
spec:
  initContainers:
    - name: wait-for-db
      image: busybox
      command: ['sh', '-c', 'until nc -z rcmoocs-db-service 5432; 
                do echo "Waiting for DB..."; sleep 3; done;
                echo "DB is ready!"']
  containers:
    - name: lms-web
      image: manishvishwa801/lms-web:latest
      ports:
        - containerPort: 5000
      env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: lmsapp-config
              key: DATABASE_URL
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: lmsapp-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: lmsapp-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: lmsapp-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: lmsapp-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DATASOURCE_PASSWORD